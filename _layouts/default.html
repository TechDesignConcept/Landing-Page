<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} - Azure & Cloud Consulting{% endif %}</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/imgs/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/imgs/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/imgs/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0A0A0A">

    <link rel="preload" href="/assets/fonts/GeistVF.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/GeistMonoVF.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="/feed.xml" />

    <!-- Security headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self' https://cdnjs.cloudflare.com https://use.fontawesome.com data:; connect-src 'self' https://formspree.io https://www.google-analytics.com; base-uri 'self'; form-action https://formspree.io; object-src 'none';">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- X-Content-Type-Options, X-Frame-Options, and Permissions-Policy must be HTTP response headers — meta equivalents are ignored by browsers. Configure these at the CDN/proxy layer (e.g. Cloudflare Page Rules or Workers). -->

    {% seo title=false %}

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8V446GX4QE"></script>
    <script src="/assets/js/gtag-init.js"></script>
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>
    {% include header.html %}

    <main id="main">
        {{ content }}
    </main>

    {% include footer.html %}

    <script src="/assets/js/menu.js"></script>
    <script src="/assets/js/motion.js"></script>
    <script src="/assets/js/contact.js"></script>
</body>
</html>
